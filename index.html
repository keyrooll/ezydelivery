<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ezydelivery — #1 Durian Delivery</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="configs/ezydelivery.js"></script>
<style>
  :root{ --green:#1a7a4a; --green2:#2d9e62; --bg:#f4f6f5; --card:#fff;
         --line:#e3e8e5; --mid:#6b7280; --ink:#14241c; --amber:#f59e0b; --blue:#2563eb; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
        background:var(--bg); color:var(--ink); }
  header{ background:var(--green); color:#fff; padding:10px 16px; display:flex;
          align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
  header .brand{ display:flex; align-items:center; gap:10px; }
  header .brand img{ height:38px; width:38px; border-radius:9px; background:#fff; padding:3px; object-fit:contain; }
  header .brand .name{ font-size:16px; font-weight:800; line-height:1.1; }
  header .brand .tag{ font-size:10px; opacity:.85; font-weight:500; }
  header .who{ font-size:12px; text-align:right; line-height:1.3; }
  header .who .role{ display:inline-block; background:rgba(255,255,255,.2); padding:1px 7px;
    border-radius:10px; font-size:10px; text-transform:uppercase; font-weight:700; margin-top:2px; }
  header .who a{ color:#fff; opacity:.8; font-size:11px; cursor:pointer; text-decoration:underline; }
  .wrap{ max-width:960px; margin:0 auto; padding:12px; }
  nav.tabs{ display:flex; gap:6px; margin:6px 0 12px; flex-wrap:wrap; }
  nav.tabs button{ padding:8px 14px; border:1px solid var(--line); background:#fff;
    border-radius:9px; font-size:13px; font-weight:600; color:var(--mid); cursor:pointer; }
  nav.tabs button.active{ background:var(--green); color:#fff; border-color:var(--green); }
  /* KPI */
  .kpis{ display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:12px; }
  .kpi{ background:#fff; border:1px solid var(--line); border-radius:10px; padding:10px; text-align:center; cursor:pointer; transition:.12s; }
  .kpi:hover{ border-color:var(--green2); }
  .kpi-on{ background:var(--green); border-color:var(--green); }
  .kpi.kpi-on .n, .kpi.kpi-on .l{ color:#fff !important; }
  .kpi .n{ font-size:20px; font-weight:800; color:var(--green); }
  .kpi .l{ font-size:10px; color:var(--mid); margin-top:2px; text-transform:uppercase; letter-spacing:.3px; }
  @media(max-width:640px){ .kpis{ grid-template-columns:repeat(2,1fr); } }
  /* toolbar */
  .toolbar{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:12px; }
  .toolbar input, .toolbar select{ padding:8px 10px; border:1px solid var(--line); border-radius:8px; font-size:13px; }
  .toolbar input.search{ flex:1; min-width:160px; }
  .subtabs{ display:flex; gap:6px; }
  .subtabs button{ padding:6px 10px; border:1px solid var(--line); background:#fff; border-radius:8px;
    font-size:12px; color:var(--mid); cursor:pointer; }
  .subtabs button.active{ background:var(--ink); color:#fff; border-color:var(--ink); }
  /* cards */
  .card{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:10px; }
  .card .top{ display:flex; justify-content:space-between; gap:8px; align-items:flex-start; }
  .card .oid{ font-weight:700; font-size:14px; }
  .card .amt{ color:var(--green); font-weight:700; white-space:nowrap; }
  .card .cust{ font-size:14px; margin-top:2px; }
  .card .meta{ font-size:12px; color:var(--mid); margin-top:4px; line-height:1.5; }
  .badge{ display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; margin-left:4px; }
  .b-PENDING{ background:#fef3c7; color:#92400e; } .b-ASSIGNED{ background:#dbeafe; color:#1e40af; }
  .b-ON_DELIVERY{ background:#e0e7ff; color:#3730a3; } .b-DELIVERED{ background:#dcfce7; color:#166534; }
  .b-CANCELED{ background:#fee2e2; color:#991b1b; }
  .pill{ display:inline-block; font-size:10px; font-weight:700; padding:1px 7px; border-radius:10px; }
  .pill-lala{ background:#fef9c3; color:#854d0e; } .pill-free{ background:#dcfce7; color:#166534; }
  .pill-paid{ background:#dcfce7; color:#166534; } .pill-pending{ background:#fee2e2; color:#991b1b; }
  .form{ margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); display:grid;
    grid-template-columns:1fr 1fr; gap:8px; }
  .form label{ font-size:11px; color:var(--mid); display:block; margin-bottom:2px; }
  .form input,.form select{ width:100%; padding:8px; border:1px solid var(--line); border-radius:8px; font-size:13px; }
  .form .full{ grid-column:1/3; }
  .seg{ display:flex; gap:6px; }
  .seg button{ flex:1; padding:8px; border:1px solid var(--line); background:#fff; border-radius:8px;
    font-size:12px; font-weight:700; cursor:pointer; color:var(--mid); }
  .seg button.on{ background:var(--green); color:#fff; border-color:var(--green); }
  .btn{ padding:10px 14px; border:none; border-radius:9px; font-size:13px; font-weight:700; cursor:pointer; }
  .btn-green{ background:var(--green); color:#fff; } .btn-wa{ background:#25d366; color:#fff; }
  .btn-out{ background:#fff; color:var(--green); border:1px solid var(--green); }
  .btn-ink{ background:var(--ink); color:#fff; } .btn-sm{ padding:6px 10px; font-size:12px; }
  .btn-row{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .empty{ text-align:center; color:var(--mid); padding:40px 12px; font-size:14px; }
  table.tbl{ width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--line); border-radius:12px; overflow:hidden; }
  table.tbl th,table.tbl td{ text-align:left; padding:10px; font-size:13px; border-bottom:1px solid var(--line); }
  table.tbl th{ background:#f0f3f1; font-size:11px; text-transform:uppercase; color:var(--mid); }
  .signin{ display:flex; flex-direction:column; align-items:center; gap:14px; padding:60px 20px; text-align:center; }
  .signin h2{ margin:0; }
  .toast{ position:fixed; bottom:16px; left:50%; transform:translateX(-50%); background:#14241c; color:#fff;
    padding:10px 16px; border-radius:9px; font-size:13px; opacity:0; transition:opacity .2s; z-index:50; max-width:90vw; }
  .toast.show{ opacity:1; } .sent{ font-size:11px; color:var(--green); font-weight:600; }
  .selbox{ width:18px; height:18px; margin-right:6px; vertical-align:middle; cursor:pointer; }
  .bulkbar{ position:sticky; top:58px; z-index:9; background:var(--ink); color:#fff; padding:10px 12px;
    border-radius:10px; margin-bottom:12px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .bulkbar b{ font-size:13px; } .bulkbar select,.bulkbar input{ padding:7px; border-radius:7px; border:none; font-size:13px; }
  .selall{ background:#fff; border:1px solid var(--line); border-radius:8px; padding:6px 10px; font-size:12px;
    font-weight:600; color:var(--green); cursor:pointer; margin-bottom:10px; }
  .modal{ position:fixed; inset:0; background:rgba(0,0,0,.4); display:none; align-items:center;
    justify-content:center; z-index:40; padding:16px; }
  .modal.show{ display:flex; } .modal .box{ background:#fff; border-radius:12px; padding:18px; width:420px; max-width:100%; }
  .modal h3{ margin:0 0 12px; } .modal .field{ margin-bottom:10px; }
  .modal label{ font-size:12px; color:var(--mid); display:block; margin-bottom:3px; }
  .modal input,.modal select,.modal textarea{ width:100%; padding:9px; border:1px solid var(--line); border-radius:8px; font-size:14px; }
  .modal .box.wide{ width:520px; }
  .switch{ position:relative; display:inline-block; width:44px; height:24px; }
  .switch input{ opacity:0; width:0; height:0; }
  .switch .sl{ position:absolute; cursor:pointer; inset:0; background:#cbd5d1; border-radius:24px; transition:.2s; }
  .switch .sl:before{ content:''; position:absolute; height:18px; width:18px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.2s; }
  .switch input:checked + .sl{ background:var(--green); }
  .switch input:checked + .sl:before{ transform:translateX(20px); }
  .lnk{ color:var(--green); font-weight:700; cursor:pointer; text-decoration:none; }
  .lnk:hover{ text-decoration:underline; }
  .dgrid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-bottom:14px; }
  .stat{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px; }
  .stat .l{ font-size:12px; color:var(--mid); } .stat .n{ font-size:26px; font-weight:800; color:var(--ink); margin-top:3px; }
  .stat .d{ font-size:11px; margin-top:2px; }
  .panel{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:14px; }
  .panel h4{ margin:0 0 12px; font-size:14px; }
  .notif{ background:#dcfce7; border:1px solid #86efac; color:#166534; border-radius:12px; padding:12px 14px; margin-bottom:12px; font-size:13px; display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .drow{ display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--line); font-size:13px; }
  .drow:last-child{ border-bottom:none; }
  .krow{ display:flex; justify-content:space-between; font-size:13px; padding:5px 0; }
  .krow .k{ color:var(--mid); }
</style>
</head>
<body>
<header>
  <div class="brand">
    <img src="logo/ezydelivery.png" alt="Ezydelivery">
    <div><div class="name">Ezydelivery</div><div class="tag">#1 Durian Delivery · <span id="appver"></span></div></div>
  </div>
  <div class="who" id="who"></div>
</header>

<div class="wrap">
  <div id="signinView" class="signin">
    <img src="logo/ezydelivery.png" alt="Ezydelivery" style="width:200px;max-width:70vw;height:auto">
    <h2 style="color:var(--green)">Ezydelivery</h2>
    <p style="color:var(--green);font-weight:600;margin:0">#1 Durian Delivery</p>
    <p style="color:var(--mid);font-size:13px;margin:4px 0 0">Log masuk untuk teruskan.</p>
    <div id="gbtn"></div>
    <p id="noAccess" style="color:#991b1b;font-size:13px;display:none">
      Akaun anda belum diberi akses. Sila hubungi admin.</p>
  </div>

  <div id="appView" style="display:none">
    <nav class="tabs" id="nav"></nav>
    <div id="view"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal" id="modal"><div class="box" id="modalBox"></div></div>

<script>
const CFG = DELIVERY_CONFIG;
{ const _v=document.getElementById('appver'); if(_v) _v.textContent=CFG.version||''; }
let ID_TOKEN=null, ME=null, VIEW='orders';
let ORDERS=[], RUNNERS=[], USERS=[], CLAIMS=[], FORMS=[];
let F={ q:'', status:'', today:false, session:'', form:'', kpi:'', date:'' }; // order filters
let SEL=new Set(); // bulk-assign selection (order ids)
let GPS_ON=false, GPS_LASTPOS=null, GPS_WATCH=null, GPS_TIMER=null, GPS_WAKE=null; // runner live GPS
let CLAIM_TAB='pending';

// ---- Sign-in ----
window.onload = () => {
  if(!window.google||!google.accounts){ setTimeout(window.onload,300); return; }
  google.accounts.id.initialize({ client_id:CFG.clientId, callback:onCredential });
  google.accounts.id.renderButton(document.getElementById('gbtn'),
    { theme:'filled_green', size:'large', text:'signin_with', shape:'pill' });
};
async function onCredential(res){
  ID_TOKEN=res.credential;
  try{
    const { user } = await api('/me');
    ME=user;
    document.getElementById('signinView').style.display='none';
    document.getElementById('appView').style.display='block';
    renderWho(); buildNav();
    VIEW = ME.role==='runner' ? 'myjobs' : (ME.role==='account' ? 'runners' : 'dashboard');
    loadView();
  }catch(e){
    if(String(e.message).includes('401')) document.getElementById('noAccess').style.display='block';
    else toast('Ralat: '+e.message);
  }
}
function logout(){ location.reload(); }
function renderWho(){
  document.getElementById('who').innerHTML =
    `${ME.email}<br><span class="role">${ME.role}</span> · <a onclick="logout()">Log keluar</a>`;
}

// ---- API ----
async function api(path, opts={}){
  const r = await fetch(CFG.workerUrl+path, { ...opts,
    headers:{ 'Content-Type':'application/json','Authorization':'Bearer '+ID_TOKEN, ...(opts.headers||{}) }});
  if(r.status===401) throw new Error('401');
  if(r.status===403){ toast('Tiada kebenaran'); throw new Error('403'); }
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

// ---- Nav ----
function buildNav(){
  const items=[];
  if(ME.role==='admin'||ME.role==='staff') items.push(['dashboard','Dashboard'],['orders','Order']);
  if(ME.role==='admin'||ME.role==='staff'||ME.role==='account') items.push(['runners','Runner']);
  if(ME.role==='admin') items.push(['forms','Cawangan'],['users','Pengguna']);
  if(ME.role==='runner') items.push(['myjobs','Hantaran Saya']);
  items.push(['complaints','Aduan']); // all roles
  document.getElementById('nav').innerHTML = items.map(([k,l])=>`<button data-v="${k}" class="${k===VIEW?'active':''}" onclick="go('${k}')">${l}</button>`).join('');
}
function go(v){ VIEW=v; document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.v===v)); loadView(); }

async function loadView(){
  const el=document.getElementById('view'); el.innerHTML='<div class="empty">Memuatkan…</div>';
  try{
    if(VIEW==='dashboard'){ await Promise.all([loadOrders(), loadRunners().catch(()=>{}), loadForms().catch(()=>{})]); renderDashboard(); }
    else if(VIEW==='orders'){ await Promise.all([loadOrders(), loadRunners().catch(()=>{}), loadForms().catch(()=>{})]); renderOrders(); }
    else if(VIEW==='myjobs'){ await Promise.all([loadOrders(), loadMyNotifs().catch(()=>{})]); renderOrders(); }
    else if(VIEW==='runners'){ await Promise.all([loadRunners(), loadOrders().catch(()=>{}), loadClaims().catch(()=>{})]); renderRunners(); }
    else if(VIEW==='forms'){ await Promise.all([loadForms(), loadOrders().catch(()=>{})]); renderForms(); }
    else if(VIEW==='complaints'){ if(ME.role==='admin'){ await loadComplaints(); } renderComplaints(); }
    else if(VIEW==='users'){ await Promise.all([loadUsers(),loadRunners(),loadOrders().catch(()=>{})]); renderUsers(); }
  }catch(e){ el.innerHTML='<div class="empty">Gagal muat: '+e.message+'</div>'; }
}

// ==== ORDERS ====
// Load ALL orders once; every filter runs client-side so KPIs stay accurate
// and filtering is instant. (Runner role is still scoped server-side.)
async function loadOrders(){
  const { orders } = await api('/orders?limit=5000');
  ORDERS=orders||[];
}
function isToday(x){ if(!x) return false; const d=new Date(x), n=new Date();
  return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate(); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function productLine(o){ return (o.products||[]).map(p=>`${esc(p.name)}${p.qty?' ×'+p.qty:''}`).join(', '); }
function runnerLabel(o){ return o.delivery_type==='lalamove' ? '' : (o.runner_name||''); }

function renderOrders(){
  const el=document.getElementById('view');
  const isMy = VIEW==='myjobs';
  let html='';
  if(isMy) html += notifBanner() + gpsBar();
  if(!isMy){
    // KPI — clickable filters, counts over ALL orders (not the filtered view)
    const t=ORDERS.filter(o=>isToday(o.created_at));
    const k=(n,l,key)=>`<div class="kpi${F.kpi===key?' kpi-on':''}" onclick="setKpi('${key}')"><div class="n">${n}</div><div class="l">${l}</div></div>`;
    html+=`<div class="kpis">
      ${k(t.length,'Order Hari Ni','today')}
      ${k(ORDERS.filter(o=>o.status==='PENDING').length,'Belum Assign','pending')}
      ${k(ORDERS.filter(o=>o.status==='ASSIGNED'||o.status==='ON_DELIVERY').length,'Dalam Hantaran','delivery')}
      ${k(ORDERS.filter(o=>o.status==='DELIVERED').length,'Selesai','done')}
      ${k('RM'+t.reduce((s,o)=>s+(+o.total_amount||0),0).toFixed(0),'Jualan Hari Ni','today')}
    </div>`;
    html+=`<div class="toolbar">
      <input class="search" id="q" placeholder="Cari nama / telefon / order ID" value="${esc(F.q)}" onkeydown="if(event.key==='Enter')applyFilter()">
      <select id="st" onchange="applyFilter()">
        <option value="">Semua status</option>
        <option value="PENDING">Belum assign</option>
        <option value="ASSIGNED">Assigned</option>
        <option value="ON_DELIVERY">Dalam hantaran</option>
        <option value="DELIVERED">Selesai</option>
        <option value="CANCELED">Batal</option>
      </select>
      <input type="date" id="dt2" value="${esc(F.date)}" onchange="applyFilter()" title="Tapis ikut tarikh">
      ${F.date?`<button class="btn btn-out btn-sm" onclick="clearDate()">✕ tarikh</button>`:''}
      ${FORMS.length?`<select id="fm" onchange="setForm(this.value)">
        <option value="">Semua cawangan</option>
        ${FORMS.filter(f=>f.active).map(f=>`<option value="${esc(f.form_id)}" ${F.form===f.form_id?'selected':''}>${esc(f.name)}</option>`).join('')}
      </select>`:''}
      <button class="btn btn-ink btn-sm" onclick="openManual()">+ Order Manual</button>
      ${CFG.sheetUrl?`<button class="btn btn-out btn-sm" onclick="window.open(CFG.sheetUrl,'_blank')">📊 Buka Google Sheet</button>`:''}
    </div>`;
    // Delivery-session sub-tabs
    const sTab=(k,l)=>`<button class="${F.session===k?'active':''}" onclick="setSession('${k}')">${l} <span style="opacity:.7">${ORDERS.filter(o=>k===''||o.delivery_session===k||(k==='none'&&!o.delivery_session)).length}</span></button>`;
    html+=`<div class="subtabs" style="margin-bottom:12px">
      ${sTab('','Semua')}${sTab('sesi1','Sesi 1')}${sTab('sesi2','Sesi 2')}${sTab('pickup','Pickup')}</div>`;
  }
  let rows = ORDERS.slice();
  if(!isMy){
    if(F.q){ const qq=F.q.toLowerCase();
      rows=rows.filter(o=>(o.customer_name||'').toLowerCase().includes(qq)||(o.phone||'').includes(F.q)||(o.order_id||'').toLowerCase().includes(qq)); }
    if(F.status) rows=rows.filter(o=>o.status===F.status);
    if(F.date) rows=rows.filter(o=>(o.created_at||'').slice(0,10)===F.date);
    if(F.session) rows=rows.filter(o=>o.delivery_session===F.session);
    if(F.form) rows=rows.filter(o=>o.form_id===F.form);
    if(F.kpi==='pending') rows=rows.filter(o=>o.status==='PENDING');
    else if(F.kpi==='delivery') rows=rows.filter(o=>o.status==='ASSIGNED'||o.status==='ON_DELIVERY');
    else if(F.kpi==='done') rows=rows.filter(o=>o.status==='DELIVERED');
    else if(F.kpi==='today') rows=rows.filter(o=>isToday(o.created_at));
  }
  if(!isMy){
    const av = rows.filter(o=>o.status==='PENDING'&&o.delivery_session!=='pickup');
    if(av.length){
      const allSel = av.every(o=>SEL.has(o.order_id));
      html += `<div><button class="selall" onclick="${allSel?'clearSel()':'selectAllVisible()'}">${allSel?'☑ Nyahpilih ('+av.length+')':'☐ Pilih semua ('+av.length+')'}</button></div>`;
    }
    if(SEL.size>0) html += bulkBar();
  }
  html += rows.length ? rows.map(o=>cardHTML(o,isMy)).join('') : '<div class="empty">Tiada order.</div>';
  el.innerHTML=html;
  if(!isMy){ const st=document.getElementById('st'); if(st) st.value=F.status; }
}
function applyFilter(){
  F.q=(document.getElementById('q')||{}).value||'';
  F.status=(document.getElementById('st')||{}).value||'';
  F.date=(document.getElementById('dt2')||{}).value||'';
  renderOrders(); // all client-side now
}
function clearDate(){ F.date=''; renderOrders(); }
function setKpi(k){ F.kpi = F.kpi===k ? '' : k; renderOrders(); } // click KPI to filter by status
function setSession(s){ F.session=s; renderOrders(); } // client-side, no reload
function setForm(v){ F.form=v; renderOrders(); }
// ---- Runner live GPS (foreground PWA) ----
function gpsBar(){
  return `<div class="bulkbar" style="background:${GPS_ON?'var(--green)':'var(--ink)'}">
    <b>📍 ${GPS_ON?'Lokasi sedang dikongsi':'Kongsi lokasi masa hantar'}</b>
    <button class="btn btn-sm" style="background:#fff;color:var(--ink)" onclick="toggleGps()">${GPS_ON?'Henti':'Mula Kongsi Lokasi'}</button>
    <span id="gpsInfo" style="font-size:11px;opacity:.85"></span>
  </div>`;
}
function toggleGps(){
  if(GPS_ON){ stopGps(); toast('Kongsi lokasi dihentikan'); renderOrders(); return; }
  if(!navigator.geolocation){ toast('Peranti tak sokong GPS'); return; }
  navigator.geolocation.getCurrentPosition(async(p)=>{
    GPS_ON=true; GPS_LASTPOS=p.coords;
    GPS_WATCH=navigator.geolocation.watchPosition(pos=>{ GPS_LASTPOS=pos.coords; }, ()=>{}, {enableHighAccuracy:true, maximumAge:10000});
    await pingGps(); GPS_TIMER=setInterval(pingGps, 20000);
    try{ if('wakeLock' in navigator) GPS_WAKE=await navigator.wakeLock.request('screen'); }catch(e){}
    toast('Lokasi mula dikongsi'); renderOrders();
  }, ()=>toast('Kebenaran lokasi ditolak'), {enableHighAccuracy:true, timeout:10000});
}
function stopGps(){
  GPS_ON=false;
  if(GPS_WATCH!=null){ navigator.geolocation.clearWatch(GPS_WATCH); GPS_WATCH=null; }
  if(GPS_TIMER){ clearInterval(GPS_TIMER); GPS_TIMER=null; }
  if(GPS_WAKE){ try{GPS_WAKE.release();}catch(e){} GPS_WAKE=null; }
}
async function pingGps(){
  if(!GPS_LASTPOS) return;

// ---- Bulk assign ----
function toggleSel(id){ SEL.has(id)?SEL.delete(id):SEL.add(id); renderOrders(); }
function clearSel(){ SEL.clear(); renderOrders(); }
function visibleAssignable(){
  let rows=ORDERS;
  if(F.session) rows=rows.filter(o=>o.delivery_session===F.session);
  if(F.form) rows=rows.filter(o=>o.form_id===F.form);
  return rows.filter(o=>o.status==='PENDING'&&o.delivery_session!=='pickup').map(o=>o.order_id);
}
function selectAllVisible(){ visibleAssignable().forEach(id=>SEL.add(id)); renderOrders(); }
function bulkBar(){
  const opts=RUNNERS.filter(r=>r.active).map(r=>`<option value="${esc(r.id)}">${esc(r.name)}</option>`).join('');
  return `<div class="bulkbar">
    <b>${SEL.size} order dipilih →</b>
    <select id="bdt" onchange="toggleBulkType()">
      <option value="freelance">Runner Freelance</option><option value="lalamove">Lalamove</option>
    </select>
    <select id="brun" class="bfree">${opts||'<option value=\"\">(tiada runner)</option>'}</select>
    <input id="bclm" class="bfree" type="number" step="0.50" placeholder="Claim RM/order" style="width:120px">
    <input id="beta" placeholder="Anggaran tiba" style="width:110px">
    <select id="btrkMode" onchange="document.getElementById('btrk').style.display=this.value==='same'?'':'none'">
      <option value="none">Tracking: kosong</option><option value="same">Tracking sama semua</option><option value="each">Tracking asing (edit tiap order)</option>
    </select>
    <input id="btrk" placeholder="Tracking" style="width:120px;display:none">
    <button class="btn btn-green btn-sm" onclick="doBulkAssign()">Assign ${SEL.size} order</button>
    <button class="btn btn-out btn-sm" onclick="clearSel()">Batal</button>
  </div>`;
}
function toggleBulkType(){
  const free=document.getElementById('bdt').value==='freelance';
  document.querySelectorAll('.bulkbar .bfree').forEach(el=>el.style.display=free?'':'none');
}
async function doBulkAssign(){
  const dt=(document.getElementById('bdt')||{}).value||'freelance';
  const body={ order_ids:[...SEL], delivery_type:dt, est_time:((document.getElementById('beta')||{}).value||'').trim() };
  if(dt==='freelance'){
    const r=(document.getElementById('brun')||{}).value;
    if(!r){ toast('Pilih runner dulu'); return; }
    body.runner_id=r; const c=(document.getElementById('bclm')||{}).value; if(c) body.claim_amount=Number(c);
  }
  const tm=(document.getElementById('btrkMode')||{}).value;
  if(tm==='same'){ body.tracking=((document.getElementById('btrk')||{}).value||'').trim(); }
  try{ const res=await api('/orders/bulk-assign',{method:'POST',body:JSON.stringify(body)});
    toast((res.assigned||0)+' order diassign'+((tm==='each')?' — set tracking asing melalui Edit tiap order':'')); SEL.clear(); await loadOrders(); renderOrders();
  }catch(e){ toast('Gagal: '+e.message); }
}

function sessionBadge(o){
  const map={ sesi1:['SESI 1','#e0e7ff','#3730a3'], sesi2:['SESI 2','#fce7f3','#9d174d'], pickup:['PICKUP','#ffedd5','#9a3412'] };
  const m=map[o.delivery_session]; return m?`<span class="pill" style="background:${m[1]};color:${m[2]}">${m[0]}</span>`:'';
}
function cardHTML(o, isMy){
  const prod=productLine(o), rl=runnerLabel(o);
  const isPickup=o.delivery_session==='pickup';
  const dpill = isPickup ? '' : o.delivery_type==='lalamove' ? '<span class="pill pill-lala">LALAMOVE</span>'
              : o.delivery_type==='freelance' ? '<span class="pill pill-free">FREELANCE</span>' : '';
  const claimPill = o.claim_amount!=null ?
     ` <span class="pill pill-${o.claim_status==='paid'?'paid':'pending'}">Claim RM${(+o.claim_amount).toFixed(2)} ${o.claim_status==='paid'?'✓':''}</span>`:'';
  let actions='';
  if(!isMy && isPickup){
    // Self-pickup: no runner. Customer collects; just notify + mark done.
    actions=`<div class="meta" style="color:#9a3412">🏬 Self-pickup — customer ambil sendiri, tiada runner.
      ${o.wa1_sent_at?'<span class="sent">✓ WA sedia diambil</span>':''}</div>
      <div class="btn-row">
        ${o.status!=='DELIVERED'?`<button class="btn btn-wa" onclick="sendWA('${esc(o.order_id)}','pickup')">Hantar WA (Sedia Diambil)</button>
        <button class="btn btn-green" onclick="markDelivered('${esc(o.order_id)}')">Tandakan Diambil</button>`
        :'<span class="badge b-DELIVERED">DIAMBIL</span>'}
      </div>`;
  } else if(!isMy){
    if(o.status==='PENDING') actions=assignForm(o);
    else if(o.status==='ASSIGNED') actions=`
      <div class="meta">${rl?'Runner: <b>'+esc(rl)+'</b> · ':''}${o.tracking?esc(o.tracking)+' · ':''}${esc(o.est_time||'')}</div>
      <div class="btn-row">
        <button class="btn btn-wa" onclick="sendWA('${esc(o.order_id)}',1)">Hantar WA #1</button>
        <button class="btn btn-out btn-sm" onclick="openEdit('${esc(o.order_id)}')">Edit</button>
      </div>`;
    else if(o.status==='ON_DELIVERY') actions=`
      <div class="meta">${rl?'Runner: <b>'+esc(rl)+'</b>':''} ${o.wa1_sent_at?'<span class="sent">✓ WA#1</span>':''}</div>
      <div class="btn-row">
        <button class="btn btn-out btn-sm" onclick="sendWA('${esc(o.order_id)}',1)">WA #1 semula</button>
        <button class="btn btn-green" onclick="markDelivered('${esc(o.order_id)}')">Tandakan Selesai</button>
      </div>`;
    else if(o.status==='DELIVERED') actions=`
      <div class="meta">${rl?'Runner: <b>'+esc(rl)+'</b>':''} ${o.wa2_sent_at?'<span class="sent">✓ WA#2</span>':''}</div>
      <div class="btn-row"><button class="btn btn-wa" onclick="sendWA('${esc(o.order_id)}',2)">Hantar WA #2</button></div>`;
  } else {
    const addr=encodeURIComponent(o.address||'');
    actions=`<div class="btn-row">
      <a class="btn btn-out btn-sm" href="https://www.google.com/maps/dir/?api=1&destination=${addr}" target="_blank">🧭 Navigate</a>
      ${o.phone?`<a class="btn btn-out btn-sm" href="tel:${esc(o.phone)}">📞 Customer</a>`:''}
      ${o.status==='ASSIGNED'?`<button class="btn btn-green btn-sm" onclick="runnerStatus('${esc(o.order_id)}','ON_DELIVERY')">Mula Hantar</button>`:''}
      ${o.status==='ON_DELIVERY'?`<button class="btn btn-green btn-sm" onclick="runnerStatus('${esc(o.order_id)}','DELIVERED')">Tandakan Sampai</button>`:''}
      ${o.status==='DELIVERED'?'<span class="badge b-DELIVERED">SELESAI</span>':''}
    </div>`;
  }
  const canSelect = !isMy && o.status==='PENDING' && !isPickup;
  const strip={PENDING:'#eda100',ASSIGNED:'#2a78d6',ON_DELIVERY:'#4a3aa7',DELIVERED:'#1baf7a',CANCELED:'#e34948'}[o.status]||'#cbd5d1';
  const slbl={PENDING:'belum assign',ASSIGNED:'assigned',ON_DELIVERY:'dalam hantaran',DELIVERED:'selesai',CANCELED:'batal'}[o.status]||o.status;
  return `<div class="card" style="border-left:3px solid ${strip};padding-left:13px">
    <div class="top">
      <div style="min-width:0;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        ${canSelect?`<input type="checkbox" class="selbox" ${SEL.has(o.order_id)?'checked':''} onclick="toggleSel('${esc(o.order_id)}')">`:''}
        <span class="oid">#${esc(o.order_id)}</span>
        <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:${strip}">${slbl}</span>

      <span class="amt">RM${(+o.total_amount||0).toFixed(2)}</span>

    <div class="cust">${esc(o.customer_name)} <span style="color:var(--mid);font-weight:400">· ${esc(o.phone)}</span></div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:7px">

  return `<div class="form" id="f-${id}">

      </div></div>
    <div id="freeBox-${id}"><label>Runner</label>
      <select id="run-${id}">${opts||'<option value="">(tiada runner — tambah dulu)</option>'}</select></div>
    <div id="claimBox-${id}"><label>Claim runner (RM)</label>
      <input id="clm-${id}" type="number" step="0.50" placeholder="cth 10.00"></div>

function pickType(id,t){
  document.getElementById('dtype-'+id).value=t;
  document.getElementById('dt-free-'+id).classList.toggle('on',t==='freelance');
  document.getElementById('dt-lala-'+id).classList.toggle('on',t==='lalamove');
  const show=t==='freelance'?'':'none';
  document.getElementById('freeBox-'+id).style.display=show;
  document.getElementById('claimBox-'+id).style.display=show;
}
async function assign(id){
  const g=s=>(document.getElementById(s+'-'+id)||{}).value||'';
  const dtype=g('dtype');
  const body={ delivery_type:dtype, tracking:g('trk').trim(), est_time:g('eta').trim(), remark:g('rmk').trim() };
  if(dtype==='freelance'){
    if(!g('run')){ toast('Pilih runner dulu'); return; }
    body.runner_id=g('run'); body.claim_amount=g('clm')?Number(g('clm')):null;
  }
  try{ await api(`/orders/${encodeURIComponent(id)}/assign`,{method:'POST',body:JSON.stringify(body)});
    toast('Disimpan'); await loadOrders(); renderOrders();
  }catch(e){ toast('Gagal: '+e.message); }
}
async function sendWA(id, kind){
  const o=ORDERS.find(x=>x.order_id===id); if(!o) return;
  if(!o.phone){ toast('Tiada telefon'); return; }
  const disp={ ...o, runner:runnerLabel(o) };
  const tmpl = kind===1?CFG.waTemplates.onDelivery : kind===2?CFG.waTemplates.delivered : CFG.waTemplates.pickup;
  window.open(`https://wa.me/${o.phone}?text=${encodeURIComponent(tmpl(disp))}`,'_blank');
  try{
    const body = kind===1?{status:'ON_DELIVERY',wa:'wa1'} : kind===2?{wa:'wa2'} : {wa:'wa1'}; // pickup: notify only
    await api(`/orders/${encodeURIComponent(id)}/status`,{method:'POST',body:JSON.stringify(body)});
    await loadOrders(); renderOrders();
  }catch(e){ toast('Status tak dikemaskini: '+e.message); }
}
async function markDelivered(id){
  try{ await api(`/orders/${encodeURIComponent(id)}/status`,{method:'POST',body:JSON.stringify({status:'DELIVERED'})});
    toast('Selesai — hantar WA #2'); await loadOrders(); renderOrders();
  }catch(e){ toast('Gagal: '+e.message); }
}

// ==== RUNNERS (list + KPI + claim settlement) ====
let RUNNER_SUB='list';
async function loadRunners(){ const {runners}=await api('/runners'); RUNNERS=runners||[]; }
function renderRunners(){
  const el=document.getElementById('view');
  // KPI computed from ORDERS + RUNNERS
  const active=RUNNERS.filter(r=>r.active).length;
  const claims=ORDERS.filter(o=>o.delivery_type==='freelance'&&o.claim_amount!=null);
  const pending=claims.filter(o=>o.claim_status==='pending').reduce((s,o)=>s+(+o.claim_amount||0),0);
  const paid=claims.filter(o=>o.claim_status==='paid').reduce((s,o)=>s+(+o.claim_amount||0),0);
  const delivered=ORDERS.filter(o=>o.status==='DELIVERED'&&o.runner_id).length;
  const st=(l,n,c)=>`<div class="stat"><div class="l">${l}</div><div class="n"${c?` style="color:${c}"`:''}>${n}</div></div>`;
  let html=`<div class="dgrid">
    ${st('Runner aktif',active)}${st('Belum bayar','RM'+pending.toFixed(0),'#b91c1c')}
    ${st('Dah bayar','RM'+paid.toFixed(0),'#166534')}${st('Jumlah hantaran',delivered)}
  </div>
  <div class="subtabs" style="margin-bottom:12px">
    <button class="${RUNNER_SUB==='list'?'active':''}" onclick="RUNNER_SUB='list';renderRunners()">Senarai Runner</button>
    <button class="${RUNNER_SUB==='claim'?'active':''}" onclick="RUNNER_SUB='claim';renderRunners()">Claim / Bayaran</button>
  </div>`;
  if(RUNNER_SUB==='claim'){ el.innerHTML=html+'<div id="claimZone"></div>'; renderClaimsInto('claimZone'); return; }
  html+=`<div class="toolbar"><button class="btn btn-ink btn-sm" onclick="openRunner()">+ Tambah Runner</button></div>
    <table class="tbl"><thead><tr><th>Nama</th><th>Telefon</th><th>Login</th><th>Belum Bayar</th><th>Status</th><th></th></tr></thead>
    <tbody>${RUNNERS.map(r=>{ const s=runnerStats(r.id); return `<tr>
      <td><span class="lnk" onclick="openRunnerDetail('${esc(r.id)}')">${esc(r.name)}</span></td>
      <td>${esc(r.phone||'')}</td><td style="font-size:11px;color:var(--mid)">${esc(r.email||'—')}</td>
      <td>${s.pending?'<b style="color:#b91c1c">RM'+s.pending.toFixed(2)+'</b>':'—'}</td>
      <td>${r.active?'<span class="pill pill-free">Aktif</span>':'<span class="pill pill-pending">Nyahaktif</span>'}</td>
      <td style="white-space:nowrap"><button class="btn btn-out btn-sm" onclick="toggleRunner('${esc(r.id)}',${r.active?0:1})">${r.active?'Nyahaktif':'Aktif'}</button>
        <button class="btn btn-out btn-sm" style="color:#b91c1c;border-color:#fca5a5" onclick="deleteRunner('${esc(r.id)}','${esc(r.name)}')">Delete</button></td>
    </tr>`;}).join('')||'<tr><td colspan=6 class="empty">Tiada runner.</td></tr>'}</tbody></table>`;
  el.innerHTML=html;
}
async function deleteRunner(id,name){
  if(!confirm('Padam runner "'+name+'"? Order lama kekal tapi tak lagi terpaut pada runner ini.')) return;
  try{ await api(`/runners/${encodeURIComponent(id)}/delete`,{method:'POST',body:'{}'});
    toast('Runner dipadam'); await loadRunners(); renderRunners();
  }catch(e){ toast('Gagal: '+e.message); }
}
function runnerStats(rid){
  const os=ORDERS.filter(o=>o.runner_id===rid);
  const delivered=os.filter(o=>o.status==='DELIVERED');
  const claims=os.filter(o=>o.claim_amount!=null);
  const pending=claims.filter(o=>o.claim_status==='pending').reduce((s,o)=>s+(+o.claim_amount||0),0);
  const paid=claims.filter(o=>o.claim_status==='paid').reduce((s,o)=>s+(+o.claim_amount||0),0);
  const rated=os.filter(o=>o.rating); const avg=rated.length?(rated.reduce((s,o)=>s+o.rating,0)/rated.length):0;
  return { os, total:os.length, delivered:delivered.length, active:os.filter(o=>o.status==='ASSIGNED'||o.status==='ON_DELIVERY').length, pending, paid, avg, rated:rated.length };
}
function openRunnerDetail(rid){
  const r=RUNNERS.find(x=>x.id===rid); if(!r) return;
  const s=runnerStats(rid);
  showModalWide(`<h3>${esc(r.name)}</h3>
    <div style="font-size:12px;color:var(--mid);margin-bottom:12px">${esc(r.phone||'-')} · ${esc(r.email||'tiada login')} · ${r.active?'Aktif':'Nyahaktif'}</div>
    <div class="dgrid">
      <div class="stat"><div class="l">Jumlah order</div><div class="n">${s.total}</div></div>
      <div class="stat"><div class="l">Selesai</div><div class="n">${s.delivered}</div></div>
      <div class="stat"><div class="l">Rating</div><div class="n">${s.avg?s.avg.toFixed(1)+'★':'-'}</div><div class="d" style="color:var(--mid)">${s.rated} penilaian</div></div>
    </div>
    <div class="panel" style="margin:0 0 12px"><h4>Bayaran (Claim)</h4>
      <div class="krow"><span class="k">Belum bayar</span><b style="color:#b91c1c">RM${s.pending.toFixed(2)}</b></div>
      <div class="krow"><span class="k">Dah bayar</span><b style="color:var(--green)">RM${s.paid.toFixed(2)}</b></div>
      <div class="krow"><span class="k">Jumlah pendapatan</span><b>RM${(s.pending+s.paid).toFixed(2)}</b></div>
    </div>
    <h4 style="margin:0 0 6px;font-size:13px">Kerja terkini</h4>
    <div style="max-height:220px;overflow:auto">${s.os.slice(0,20).map(o=>`<div class="drow"><span style="flex:1">#${esc(o.order_id)}</span><span class="badge b-${o.status}">${o.status}</span>${o.claim_amount!=null?`<span class="pill pill-${o.claim_status==='paid'?'paid':'pending'}">RM${(+o.claim_amount).toFixed(0)}</span>`:''}</div>`).join('')||'<div class="empty">Tiada kerja lagi.</div>'}</div>
    <div class="btn-row"><button class="btn btn-out" onclick="closeModal()">Tutup</button></div>`);

// ==== FORMS (branches) ====
async function loadForms(){ const {forms}=await api('/forms'); FORMS=forms||[]; }
let EDIT_FORM=null;
let CHFORM=null;
function renderForms(){
  const el=document.getElementById('view');
  // Per-branch stats from ORDERS
  const nameOf=id=>{ const f=FORMS.find(x=>x.form_id===id); return (f&&f.name)||id||'(tiada)'; };
  const grp={};
  ORDERS.forEach(o=>{ const k=o.form_name||nameOf(o.form_id); const g=grp[k]=grp[k]||{n:0,rm:0}; g.n++; g.rm+=(+o.total_amount||0); });

async function loadClaims(){ const {claims}=await api('/claims?status='+CLAIM_TAB); CLAIMS=claims||[]; }
let CLAIM_SEL=new Set();
function claimToggle(id){ CLAIM_SEL.has(id)?CLAIM_SEL.delete(id):CLAIM_SEL.add(id); renderClaimsInto('claimZone'); }
function selectRunnerClaims(ids){ ids.forEach(id=>CLAIM_SEL.add(id)); renderClaimsInto('claimZone'); }
function renderClaimsInto(elId){
  const el=document.getElementById(elId); if(!el) return;
  const canPay=(ME.role==='admin'||ME.role==='account');
  const groups={};
  CLAIMS.forEach(c=>{ const k=c.runner_name||'(tiada runner)'; (groups[k]=groups[k]||[]).push(c); });
  const tab=(k,l)=>`<button class="${CLAIM_TAB===k?'active':''}" onclick="CLAIM_TAB='${k}';CLAIM_SEL.clear();loadClaims().then(()=>renderClaimsInto('${elId}'))">${l}</button>`;
  let html=`<div class="subtabs" style="margin-bottom:12px">${tab('pending','Belum Bayar')}${tab('paid','Dah Bayar')}${tab('all','Semua')}</div>`;
  if(CLAIM_SEL.size>0 && canPay){
    const total=CLAIMS.filter(c=>CLAIM_SEL.has(c.order_id)).reduce((s,c)=>s+(+c.claim_amount||0),0);
    html+=`<div class="bulkbar"><b>${CLAIM_SEL.size} claim dipilih → RM${total.toFixed(2)}</b>
      <button class="btn btn-green btn-sm" onclick="settleSelected()">Confirm & Tandakan Dah Bayar</button>
      <button class="btn btn-out btn-sm" onclick="CLAIM_SEL.clear();renderClaimsInto('claimZone')">Batal</button></div>`;
  }
  const runners=Object.keys(groups);
  if(!runners.length){ html+='<div class="empty">Tiada claim.</div>'; el.innerHTML=html; return; }
  runners.forEach(rn=>{
    const list=groups[rn]; const total=list.reduce((s,c)=>s+(+c.claim_amount||0),0);
    const pendingIds=list.filter(c=>c.claim_status==='pending').map(c=>c.order_id);
    html+=`<div class="card"><div class="top">
      <div class="oid">${esc(rn)}</div>
      <div class="amt">RM${total.toFixed(2)}${canPay&&pendingIds.length?` <button class="btn btn-out btn-sm" onclick="selectRunnerClaims(${JSON.stringify(pendingIds).replace(/"/g,'&quot;')})">Tick semua</button>`:''}</div>
    </div>
    <table class="tbl" style="margin-top:8px"><tbody>${list.map(c=>`<tr>
      <td style="white-space:nowrap">${canPay&&c.claim_status==='pending'?`<input type="checkbox" class="selbox" ${CLAIM_SEL.has(c.order_id)?'checked':''} onclick="claimToggle('${esc(c.order_id)}')">`:''}#${esc(c.order_id)}</td>
      <td>${esc(c.customer_name)}</td><td>RM${(+c.claim_amount).toFixed(2)}</td>
      <td><span class="pill pill-${c.claim_status==='paid'?'paid':'pending'}">${c.claim_status}</span></td>
    </tr>`).join('')}</tbody></table></div>`;
  });
  el.innerHTML=html;
}
async function settleSelected(){
  const ids=[...CLAIM_SEL]; if(!ids.length) return;
  const total=CLAIMS.filter(c=>CLAIM_SEL.has(c.order_id)).reduce((s,c)=>s+(+c.claim_amount||0),0);
  if(!confirm(`Tandakan ${ids.length} claim (RM${total.toFixed(2)}) sebagai DAH BAYAR? Runner akan dapat notis dalam app.`)) return;
  try{ await api('/claims/pay',{method:'POST',body:JSON.stringify({order_ids:ids})});
    toast('Dibayar ✓ — runner dinotifikasikan'); CLAIM_SEL.clear(); await loadClaims(); renderClaimsInto('claimZone');
  }catch(e){ toast('Gagal: '+e.message); }
}

let CH1=null, CH2=null;
function renderDashboard(){
  const el=document.getElementById('view');

  const rated=ORDERS.filter(o=>o.rating); const avg=rated.length?(rated.reduce((s,o)=>s+o.rating,0)/rated.length):0;
  const days=[]; for(let i=6;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); days.push(d); }
  const kOf=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const trend=days.map(d=>ORDERS.filter(o=>(o.created_at||'').slice(0,10)===kOf(d)).reduce((s,o)=>s+(+o.total_amount||0),0));
  const dayLbl=days.map(d=>['Ahd','Isn','Sel','Rab','Kha','Jum','Sab'][d.getDay()]);
  const byForm={}; ORDERS.forEach(o=>{ const k=o.form_name||'(lain)'; byForm[k]=(byForm[k]||0)+1; });
  const formLbls=Object.keys(byForm), formVals=formLbls.map(k=>byForm[k]);
  const byRunner={}; ORDERS.forEach(o=>{ if(o.runner_name){ const r=byRunner[o.runner_name]=byRunner[o.runner_name]||{n:0,rate:[],name:o.runner_name}; r.n++; if(o.rating) r.rate.push(o.rating); } });

  el.innerHTML=`
    <div class="dgrid">
      ${st('Order hari ni',today.length)}${st('Jualan hari ni','RM'+salesToday.toFixed(0))}
      ${st('Belum assign',pending)}${st('Dalam hantaran',onDel)}
      ${st('Rating purata',avg?avg.toFixed(1)+'★':'-',rated.length+' penilaian')}
    </div>
    <div class="panel"><h4>Jualan 7 hari lepas</h4><div style="position:relative;height:200px"><canvas id="chTrend" role="img" aria-label="Carta jualan tujuh hari"></canvas></div></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px">
      <div class="panel"><h4>Order ikut cawangan</h4><div style="position:relative;height:210px"><canvas id="chForm" role="img" aria-label="Order ikut cawangan"></canvas></div></div>
      <div class="panel"><h4>Runner terbaik</h4>${top.map((r,i)=>`<div class="drow"><b style="width:20px">${i+1}</b><span style="flex:1">${esc(r.name)}</span><span style="color:var(--mid)">${r.n} order</span>${r.rate.length?`<span style="color:#f59e0b">★${(r.rate.reduce((s,x)=>s+x,0)/r.rate.length).toFixed(1)}</span>`:''}</div>`).join('')||'<div class="empty">Tiada data runner.</div>'}</div>
    </div>`;
  if(CH1) CH1.destroy(); if(CH2) CH2.destroy();
  const ink='#6b7280';
  CH1=new Chart(document.getElementById('chTrend'),{type:'bar',data:{labels:dayLbl,datasets:[{data:trend,backgroundColor:'#1a7a4a',borderRadius:4,maxBarThickness:28}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{color:ink,callback:v=>'RM'+v},grid:{color:'#eee'}},x:{ticks:{color:ink},grid:{display:false}}}}});
  const PAL=['#2a78d6','#1baf7a','#eda100','#4a3aa7','#e34948','#e87ba4','#eb6834','#008300'];
  CH2=new Chart(document.getElementById('chForm'),{type:'doughnut',data:{labels:formLbls,datasets:[{data:formVals,backgroundColor:PAL,borderColor:'#fff',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:11},generateLabels:(ch)=>{const d=ch.data,tot=d.datasets[0].data.reduce((a,b)=>a+b,0);return d.labels.map((l,i)=>{const v=d.datasets[0].data[i],p=tot?Math.round(v/tot*100):0;return{text:`${l} ${p}%`,fillStyle:PAL[i%PAL.length],strokeStyle:'#fff',lineWidth:1,index:i};});}}}}}});
}

    ${COMPLAINTS.length?`<div class="card" style="margin-bottom:14px"><div style="font-weight:600;margin-bottom:8px;font-size:13px">Status aduan</div><div style="height:200px"><canvas id="chComp"></canvas></div></div>`:''}
    <table class="tbl"><thead><tr><th>Dari</th><th>Order</th><th>Aduan</th><th>Status</th><th></th></tr></thead>
    <tbody>${COMPLAINTS.map(c=>`<tr>
      <td>${esc(c.from_email)}<br><span style="font-size:11px;color:var(--mid)">${esc(c.from_role)}</span></td>
      <td>${esc(c.order_id||'—')}</td>
      <td>${c.subject?'<b>'+esc(c.subject)+'</b><br>':''}<span style="font-size:12px;color:var(--mid)">${esc(c.message)}</span></td>
      <td><span class="pill pill-${c.status==='resolved'?'paid':'pending'}">${esc(c.status)}</span></td>
      <td>${c.status==='open'?`<button class="btn btn-out btn-sm" onclick="resolveComplaint(${c.id})">Selesai</button>`:''}</td>
    </tr>`).join('')||'<tr><td colspan=5 class="empty">Tiada aduan.</td></tr>'}</tbody></table>`;
  if(COMPLAINTS.length && window.Chart){
    if(window.CHCOMP) window.CHCOMP.destroy();
    window.CHCOMP=new Chart(document.getElementById('chComp'),{type:'doughnut',data:{labels:['Belum selesai','Dah selesai'],datasets:[{data:[open,done],backgroundColor:['#e34948','#1baf7a'],borderColor:'#fff',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:11}}}}}});
  }
}
async function resolveComplaint(id){
  try{ await api('/complaints/'+id+'/resolve',{method:'POST',body:'{}'}); toast('Aduan selesai'); await loadComplaints(); renderComplaints(); }catch(e){ toast('Gagal: '+e.message); }
}

// ---- toast ----
let tT; function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show');
  clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('show'),2600); }
</script>
</body>
</html>
