<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Jejak Tempahan — EzyDurian</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{ --green:#1a7a4a; --line:#e3e8e5; --mid:#6b7280; --ink:#14241c; --bg:#f4f6f5; }
  *{ box-sizing:border-box; } body{ margin:0; background:var(--bg); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; color:var(--ink); }
  .wrap{ max-width:460px; margin:0 auto; min-height:100vh; background:#fff; }
  header{ background:var(--green); color:#fff; padding:16px; }
  header .b{ font-size:18px; font-weight:800; } header .s{ font-size:12px; opacity:.85; margin-top:2px; }
  .pad{ padding:16px; }
  .hi{ font-size:16px; font-weight:700; margin:0 0 2px; } .sub{ font-size:13px; color:var(--mid); margin:0 0 16px; }
  .steps{ display:flex; align-items:flex-start; margin-bottom:16px; }
  .step{ flex:1; display:flex; flex-direction:column; align-items:center; }
  .dot{ width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px;
        background:#eef1ef; color:var(--mid); border:1px solid var(--line); }
  .dot.on{ background:var(--green); color:#fff; border-color:var(--green); }
  .dot.cur{ box-shadow:0 0 0 4px #d9ede2; }
  .step .l{ font-size:11px; margin-top:6px; color:var(--mid); text-align:center; }
  .step .l.on{ color:var(--green); font-weight:700; }
  .bar{ flex:0 0 auto; width:22px; height:2px; background:var(--line); margin-top:16px; }
  .bar.on{ background:var(--green); }
  #map{ height:280px; width:100%; background:#e8ece9; }
  .maphint{ padding:10px 16px; font-size:12px; color:var(--mid); text-align:center; }
  .card{ display:flex; align-items:center; gap:12px; background:var(--bg); border-radius:12px; padding:12px; margin:0 16px 12px; }
  .av{ width:44px; height:44px; border-radius:50%; background:#d9ede2; color:var(--green); display:flex; align-items:center; justify-content:center; font-weight:700; }
  .call{ width:40px; height:40px; border-radius:50%; background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center; text-decoration:none; font-size:18px; }
  .row{ display:flex; justify-content:space-between; font-size:13px; padding:4px 0; }
  .muted{ color:var(--mid); } .sec{ font-size:12px; color:var(--mid); margin:0 0 6px; text-transform:uppercase; letter-spacing:.3px; }
  .rate{ text-align:center; padding:20px 16px; }
  .stars{ font-size:34px; letter-spacing:6px; cursor:pointer; color:#d1d5db; }
  .stars span.on{ color:#f59e0b; }
  .btn{ display:inline-block; margin-top:12px; background:var(--green); color:#fff; border:none; border-radius:9px; padding:11px 22px; font-size:14px; font-weight:700; cursor:pointer; }
  .thanks{ color:var(--green); font-weight:700; }
  .load{ text-align:center; padding:60px 16px; color:var(--mid); }
</style>
</head>
<body>
<div class="wrap">
  <header><div class="b">🌱 EzyDurian</div><div class="s">Jejak Tempahan</div></header>
  <div id="content"><div class="load">Memuatkan…</div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const WORKER='https://ezydelivery.keyrooll.workers.dev';
const P=new URLSearchParams(location.search), O=P.get('o'), T=P.get('t');
let map, marker, lastStatus='', rated=false;

async function load(){
  if(!O||!T){ document.getElementById('content').innerHTML='<div class="load">Link tidak sah.</div>'; return; }
  let d;
  try{ const r=await fetch(`${WORKER}/track?o=${encodeURIComponent(O)}&t=${encodeURIComponent(T)}`);
    if(!r.ok) throw 0; d=(await r.json()).order;
  }catch(e){ document.getElementById('content').innerHTML='<div class="load">Tempahan tidak dijumpai atau link tamat.</div>'; return; }
  render(d);
}

function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function render(d){
  const pickup=d.delivery_session==='pickup';
  const st=d.status;
  // step index: 0 disahkan, 1 dihantar, 2 selesai
  let cur = st==='DELIVERED'?2 : (st==='ON_DELIVERY'?1 : 0);
  const stepLbl = pickup ? ['Disahkan','Sedia Diambil','Selesai'] : ['Disahkan','Sedang Dihantar','Selesai'];
  const dotIcon = ['✓', pickup?'🏬':'🛵', '🏠'];
  let steps='<div class="steps">';
  for(let i=0;i<3;i++){
    const on=i<=cur;
    steps+=`<div class="step"><div class="dot ${on?'on':''} ${i===cur?'cur':''}">${i<cur?'✓':dotIcon[i]}</div><div class="l ${i===cur?'on':''}">${stepLbl[i]}</div></div>`;
    if(i<2) steps+=`<div class="bar ${i<cur?'on':''}"></div>`;
  }
  steps+='</div>';

  const statusMsg = st==='DELIVERED' ? 'Tempahan anda telah selamat sampai. Terima kasih! 💛'
    : st==='ON_DELIVERY' ? (pickup?'Tempahan anda sedia untuk diambil.':'Tempahan durian anda sedang dalam perjalanan.')
    : 'Tempahan anda telah disahkan dan sedang disediakan.';

  const showMap = st==='ON_DELIVERY' && !pickup;
  const runner = d.runner_name ? `<div class="card">
      <div class="av">${esc((d.runner_name||'R')[0])}</div>
      <div style="flex:1"><div style="font-weight:700">${esc(d.runner_name)}</div><div class="muted" style="font-size:12px">Runner EzyDurian</div></div>
      ${d.runner_phone?`<a class="call" href="tel:${esc(d.runner_phone)}" aria-label="Telefon runner">📞</a>`:''}
    </div>` : '';

  const items = (d.products||[]).map(p=>`<div class="row"><span>${esc(p.name)}</span><span class="muted">× ${p.qty||1}</span></div>`).join('');

  let html=`<div class="pad"><p class="hi">Hai ${esc(d.name||'')}</p><p class="sub">${statusMsg}</p></div>${steps.replace(/^/,'<div class="pad" style="padding-top:0">')+'</div>'}`;
  if(showMap){ html+=`<div id="map"></div><div class="maphint" id="maphint">Menyambung ke lokasi runner…</div>`; }
  html+=runner;
  if(d.est_time && st!=='DELIVERED'){ html+=`<div class="pad" style="padding-top:0;font-size:13px;color:var(--mid)">🕒 Anggaran tiba: <b style="color:var(--ink)">${esc(d.est_time)}</b></div>`; }
  html+=`<div class="pad" style="padding-top:0"><div class="sec">Item Ditempah</div>${items||'<div class="muted">-</div>'}</div>`;
  if(st==='DELIVERED'){ html+= d.rating ? `<div class="rate"><div class="thanks">Terima kasih atas penilaian anda!</div><div class="stars">${'★'.repeat(d.rating)}${'☆'.repeat(5-d.rating)}</div></div>` : ratingBox(); }

  document.getElementById('content').innerHTML=html;
  if(showMap) initMap(d);
  lastStatus=st;
}

function ratingBox(){
  return `<div class="rate"><div style="font-size:14px;margin-bottom:8px">Bagaimana kualiti durian anda?</div>
    <div class="stars" id="stars">${[1,2,3,4,5].map(i=>`<span data-v="${i}" onclick="pick(${i})">☆</span>`).join('')}</div>
    <div><button class="btn" onclick="submitRating()">Hantar Rating</button></div></div>`;
}
let picked=0;
function pick(v){ picked=v; document.querySelectorAll('#stars span').forEach(s=>{ s.textContent=(+s.dataset.v<=v)?'★':'☆'; s.classList.toggle('on',+s.dataset.v<=v); }); }
async function submitRating(){
  if(!picked){ alert('Sila pilih bintang'); return; }
  try{ await fetch(`${WORKER}/track/rate`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({o:O,t:T,stars:picked})});
    document.querySelector('.rate').innerHTML=`<div class="thanks">Terima kasih atas penilaian anda! 💛</div><div class="stars">${'★'.repeat(picked)}${'☆'.repeat(5-picked)}</div>`;
  }catch(e){ alert('Gagal hantar. Cuba lagi.'); }
}

function initMap(d){
  if(!(d.runner_lat && d.runner_lng)){ document.getElementById('maphint').textContent='Menunggu runner mula berkongsi lokasi…'; return; }
  const pos=[d.runner_lat, d.runner_lng];
  map=L.map('map',{zoomControl:false}).setView(pos, 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19, attribution:'© OpenStreetMap'}).addTo(map);
  const icon=L.divIcon({html:'<div style="font-size:28px">🛵</div>',className:'',iconSize:[28,28],iconAnchor:[14,14]});
  marker=L.marker(pos,{icon}).addTo(map);
  document.getElementById('maphint').textContent='Lokasi runner dikemas kini setiap ~20 saat.';
}
function updateMap(d){
  if(!map) { if(d.status==='ON_DELIVERY' && d.delivery_session!=='pickup') initMap(d); return; }
  if(d.runner_lat && d.runner_lng){ const pos=[d.runner_lat,d.runner_lng]; marker.setLatLng(pos); map.panTo(pos); }
}

async function poll(){
  try{ const r=await fetch(`${WORKER}/track?o=${encodeURIComponent(O)}&t=${encodeURIComponent(T)}`);
    if(!r.ok) return; const d=(await r.json()).order;
    if(d.status!==lastStatus){ render(d); } else { updateMap(d); }
  }catch(e){}
}
load();
setInterval(poll, 20000);
</script>
</body>
</html>
